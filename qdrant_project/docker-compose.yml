services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    environment:
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
      # QDRANT__SERVICE__MAX_OPEN_FILES: 65000

volumes:
  qdrant_storage:
