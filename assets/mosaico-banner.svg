<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mosaico banner</title>
  <desc id="desc">Banner astratto con tessere colorate che richiamano un mosaico digitale.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1080" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102542"/>
      <stop offset="0.5" stop-color="#1F4E5F"/>
      <stop offset="1" stop-color="#F6AA1C"/>
    </linearGradient>
    <linearGradient id="glass" x1="300" y1="90" x2="880" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.22"/>
      <stop offset="1" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>

  <g opacity="0.9">
    <rect x="72" y="60" width="94" height="94" rx="18" fill="#F25F5C"/>
    <rect x="182" y="72" width="58" height="58" rx="14" fill="#FFE066"/>
    <rect x="252" y="52" width="120" height="120" rx="24" fill="#70C1B3"/>
    <rect x="388" y="82" width="62" height="62" rx="16" fill="#247BA0"/>
    <rect x="936" y="64" width="88" height="88" rx="20" fill="#70C1B3"/>
    <rect x="1040" y="84" width="54" height="54" rx="14" fill="#FFE066"/>
    <rect x="996" y="154" width="112" height="112" rx="24" fill="#F25F5C"/>
    <rect x="914" y="186" width="64" height="64" rx="16" fill="#247BA0"/>
    <rect x="106" y="274" width="74" height="74" rx="18" fill="#247BA0"/>
    <rect x="198" y="250" width="110" height="110" rx="24" fill="#70C1B3"/>
    <rect x="326" y="286" width="52" height="52" rx="14" fill="#FFE066"/>
    <rect x="848" y="278" width="82" height="82" rx="20" fill="#FFE066"/>
    <rect x="946" y="292" width="58" height="58" rx="14" fill="#247BA0"/>
  </g>

  <rect x="336" y="92" width="528" height="236" rx="28" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.3"/>

  <text x="600" y="172" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="700" fill="white">Mosaico</text>
  <text x="600" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#EAF4F4">
    Document QA locale con FastAPI, Qdrant, Ollama e frontend Django
  </text>
  <text x="600" y="266" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#D7E7EA">
    Una stack RAG modulare per upload, indicizzazione, ricerca e conversazioni su documenti
  </text>
</svg>
